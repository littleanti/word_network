<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FFF6E4" />
  <title>낱말 이어라 🌈</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/tokens.css" />
  <link rel="stylesheet" href="src/css/base.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/screens.css" />
</head>
<body>
  <div id="app">

    <!-- ===== START SCREEN ===== -->
    <section id="screen-start" class="screen" role="main">
      <div class="start-logo">🌈</div>
      <h1 class="start-title">낱말 이어라</h1>
      <p class="start-subtitle">순우리말 어휘 놀이</p>
      <div class="start-buttons">
        <button id="btn-quick-start" class="btn-primary">빨리 시작! 🎮</button>
        <button id="btn-settings" class="btn-secondary">⚙️ 설정</button>
        <button id="btn-resume" class="btn-secondary" disabled>📖 이어 하기</button>
      </div>
    </section>

    <!-- ===== PLAY SCREEN ===== -->
    <section id="screen-play" class="screen">

      <!-- Header: home + progress + score -->
      <header class="play-header">
        <button id="btn-home" class="btn-home" aria-label="홈으로">🏠</button>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
        <div id="score-badge" class="score-badge">⭐ 0</div>
      </header>
      <div id="progress-text" class="progress-text">0 / 0</div>

      <!-- Scene illustration (emoji collage) -->
      <div class="scene-area" id="scene-area">
        <!-- Populated by scene.js -->
      </div>

      <!-- Word assembly area -->
      <div class="word-assembly-area" id="slot-area">
        <!-- Populated by slot.js -->
      </div>

      <!-- Syllable dock -->
      <div class="dock-area">
        <div class="dock-label">음절을 탭해서 낱말을 만들어요</div>
        <div id="syllable-dock"></div>
      </div>

    </section>

    <!-- ===== END SCREEN ===== -->
    <section id="screen-end" class="screen">
      <div class="end-trophy">🏆</div>
      <h2 id="end-title" class="end-title">잘했어요!</h2>
      <p id="end-score-text" class="end-score">0점</p>
      <div id="end-stickers" class="sticker-collection"></div>
      <p id="end-encouragement" class="end-encouragement">정말 대단해요!</p>
      <div class="end-buttons">
        <button id="btn-play-again" class="btn-primary">다시 하기 🔄</button>
        <button id="btn-back-start" class="btn-secondary" onclick="document.getElementById('screen-play').classList.remove('active'); document.getElementById('screen-start').classList.add('active');">처음으로 🏠</button>
      </div>
    </section>

  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
